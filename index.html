
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner FINAL</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
    }

    video {
      width: 100%;
      max-width: 450px;
      border-radius: 12px;
    }

    .frame {
      position: absolute;
      width: 240px;
      height: 240px;
      border: 3px solid #00ff88;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ff88;
      pointer-events: none;
    }

    #status {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 1.1em;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 10;
    }

    #startScreen button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      color: black;
      font-weight: bold;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #333;
      border-top: 6px solid #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div id="startScreen">
  <h2>QR Scanner</h2>
  <button onclick="startCamera()">Kamera starten</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div>Wird geprüft...</div>
</div>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <div class="frame"></div>
  <div id="status">Bereit</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
let video = document.getElementById("video");
let status = document.getElementById("status");
let loading = document.getElementById("loading");

let scanning = false;
let stream;
let scanActive = true;

async function startCamera() {
  try {
    document.getElementById("startScreen").style.display = "none";

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    video.setAttribute("playsinline", true);

    await video.play();

    scanning = true;
    scanActive = true;
    status.innerText = "Kamera aktiv";

    requestAnimationFrame(scan);

  } catch (err) {
    status.innerText = "❌ Kamera Fehler: " + err.name;
    console.error(err);
  }
}

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
  if (!scanning || !scanActive) {
    requestAnimationFrame(scan);
    return;
  }

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const code = jsQR(imageData.data, canvas.width, canvas.height, {
      inversionAttempts: "attemptBoth"
    });

    if (code) {
      scanning = false;
      scanActive = false;

      loading.style.display = "flex";
      status.innerText = "QR erkannt";

      window.location.href = code.data;
      return;
    }
  }

  requestAnimationFrame(scan);
}
</script>

</body>
</html>
