<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Scanner PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#startScreen button {
  padding: 15px 25px;
  font-size: 18px;
  background: #00ff88;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

/* APP */
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  position: relative;
}

video {
  width: 100%;
  max-width: 450px;
  border-radius: 12px;
}

.frame {
  position: absolute;
  width: 240px;
  height: 240px;
  border: 3px solid #00ff88;
  border-radius: 12px;
  pointer-events: none;
}

#status {
  margin-top: 10px;
  opacity: 0.7;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  text-align: center;
  background: black;
  overflow: hidden;
}

/* GRID BACKGROUND */
#overlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,255,136,0.08), transparent 60%),
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: auto, 40px 40px, 40px 40px;
  animation: gridMove 6s linear infinite;
  opacity: 0.5;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* SCAN LINE */
.scan-line {
  position: absolute;
  width: 70%;
  height: 4px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
  left: 15%;
  border-radius: 50px;
  box-shadow: 0 0 25px #00ff88;
  animation: scanMove 1.1s cubic-bezier(.25,.8,.25,1) infinite;
}

@keyframes scanMove {
  0%   { top: 15%; opacity: 0.3; transform: scaleX(0.8); }
  50%  { opacity: 1; transform: scaleX(1.1); }
  100% { top: 85%; opacity: 0.3; transform: scaleX(0.8); }
}

/* RESULT STYLES */
#title {
  font-size: 44px;
  z-index: 2;
  margin: 10px 0;
}

#info {
  z-index: 2;
  white-space: pre-line;
  font-size: 22px;
  opacity: 0.9;
}

/* COLORS */
.green { background: #00c853 !important; color: black; }
.red { background: #d50000 !important; color: white; }

.hidden { display: none !important; }

</style>
</head>

<body>

<div id="startScreen">
  <h2>QR Scanner PRO</h2>
  <button onclick="startCamera()">Kamera starten</button>
</div>

<div id="overlay">
  <div class="scan-line"></div>
  <h1 id="title"></h1>
  <p id="info"></p>
</div>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <div class="frame"></div>
  <div id="status">Bereit</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
let video = document.getElementById("video");
let status = document.getElementById("status");
let overlay = document.getElementById("overlay");
let title = document.getElementById("title");
let info = document.getElementById("info");
let app = document.getElementById("app");

let scanning = false;

function startCamera() {
  document.getElementById("startScreen").style.display = "none";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    video.srcObject = stream;
    video.setAttribute("playsinline", true);

    video.onloadedmetadata = () => {
      video.play();
      scanning = true;
      status.innerText = "Kamera aktiv";
      requestAnimationFrame(scan);
    };
  })
  .catch(err => {
    status.innerText = "❌ Kamera Fehler: " + err.name;
  });
}

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      scanning = false;
      showLoading();

      fetch(code.data)
        .then(r => r.json())
        .then(res => {
          showResult(res.allowed, res);
        })
        .catch(() => {
          showResult(false, { name: "Fehler", year: "" });
        });

      return;
    }
  }

  requestAnimationFrame(scan);
}

function showLoading() {
  app.classList.add("hidden");

  overlay.className = "";
  overlay.style.display = "flex";

  title.innerText = "";
  info.innerText = "";
}

function showResult(ok, res) {

  overlay.classList.remove("green", "red");

  if (ok) {
    overlay.classList.add("green");
    title.innerText = "✔ MITGLIED";
    info.innerText = `${res.name}\nJahrgang: ${res.year}`;
  } else {
    overlay.classList.add("red");
    title.innerText = "✖ KEIN ZUTRITT";
    info.innerText = res.name || "";
  }

  setTimeout(() => {
    overlay.style.display = "none";
    app.classList.remove("hidden");
    scanning = true;
    requestAnimationFrame(scan);
  }, 2500);
}
</script>

</body>
</html>
