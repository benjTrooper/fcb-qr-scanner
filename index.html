
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: black;
    }

    .frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%);
      border: 3px solid #00ff88;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ff88;
      pointer-events: none;
    }

    .status {
      margin-top: 10px;
      font-size: 1.1em;
      opacity: 0.8;
    }

    /* Loading Screen */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #333;
      border-top: 6px solid #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div id="container">
    <video id="video" autoplay playsinline></video>
    <div class="frame"></div>
    <div class="status" id="status">Kamera wird gestartet...</div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>QR wird geprüft...</div>
  </div>

  <!-- stabile CDN Version von jsQR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const loading = document.getElementById("loading");

    let scanning = true;
    let stream;

    // 🔥 STABILE KAMERA INITIALISIERUNG
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          video.play();
          status.innerText = "Kamera aktiv";
          requestAnimationFrame(scan);
        };

      } catch (err) {
        status.innerText = "❌ Kamera Fehler: " + err.name;
        console.error(err);
      }
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 STABILER SCAN (kein Crop = zuverlässiger)
    function scan() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "attemptBoth"
        });

        if (code) {
          scanning = false;

          // Loading Screen sofort anzeigen
          loading.style.display = "flex";
          status.innerText = "QR erkannt";

          setTimeout(() => {
            window.location.href = code.data;
          }, 300);

          return;
        }
      }

      // stabile Performance
      setTimeout(() => requestAnimationFrame(scan), 80);
    }

    startCamera();
  </script>

</body>
</html>
