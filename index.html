<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Scanner PRO</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  #startScreen button {
    padding: 15px 25px;
    font-size: 18px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    font-weight: bold;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
  }

  video {
    width: 100%;
    max-width: 450px;
    border-radius: 12px;
  }

  .frame {
    position: absolute;
    width: 240px;
    height: 240px;
    border: 3px solid #00ff88;
    border-radius: 12px;
    box-shadow: 0 0 20px #00ff88;
    pointer-events: none;
  }

  #status {
    margin-top: 10px;
    opacity: 0.8;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 20;
  }
</style>
</head>

<body>

<div id="startScreen">
  <h2>QR Scanner</h2>
  <button onclick="startCamera()">Kamera starten</button>
</div>

<div id="loading">⏳ Prüfe Code...</div>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <div class="frame"></div>
  <div id="status">Bereit</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
let video = document.getElementById("video");
let status = document.getElementById("status");
let loading = document.getElementById("loading");

let stream;
let scanning = false;

function startCamera() {
  document.getElementById("startScreen").style.display = "none";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(s => {
    stream = s;
    video.srcObject = stream;
    video.setAttribute("playsinline", true);

    video.onloadedmetadata = () => {
      video.play();
      scanning = true;
      status.innerText = "Kamera aktiv";
      requestAnimationFrame(scan);
    };
  })
  .catch(err => {
    status.innerText = "❌ Kamera Fehler: " + err.name;
  });
}

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const code = jsQR(imageData.data, canvas.width, canvas.height, {
      inversionAttempts: "attemptBoth"
    });

    if (code) {
      scanning = false;

      loading.style.display = "flex";

      // 👉 WICHTIG: Apps Script API call (kein redirect mehr!)
      fetch(code.data)
        .then(r => r.json())
        .then(res => {

          if (res.allowed) {
            loading.innerHTML = "✅ Mitglied: " + res.name;
          } else {
            loading.innerHTML = "❌ Kein Zutritt";
          }

          // nach kurzer Zeit wieder scannen
          setTimeout(() => {
            loading.style.display = "none";
            scanning = true;
            requestAnimationFrame(scan);
          }, 2000);

        })
        .catch(err => {
          loading.innerHTML = "❌ Fehler";
          console.error(err);

          setTimeout(() => {
            loading.style.display = "none";
            scanning = true;
            requestAnimationFrame(scan);
          }, 2000);
        });

      return;
    }
  }

  requestAnimationFrame(scan);
}
</script>

</body>
</html>
