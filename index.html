// Verbesserte QR Scanner Version (schnell + Loading Screen)
function doGet() {
  return HtmlService.createHtmlOutput(`
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    video {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
    }

    .status {
      margin-top: 10px;
      font-size: 1.1em;
      opacity: 0.8;
    }

    .frame {
      position: absolute;
      width: 220px;
      height: 220px;
      border: 3px solid #00ff88;
      border-radius: 12px;
      box-shadow: 0 0 15px #00ff88;
      pointer-events: none;
    }

    /* 👉 Loading Screen */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #333;
      border-top: 6px solid #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="frame"></div>

  <video id="video" autoplay playsinline></video>
  <div class="status" id="status">Kamera aktiv</div>

  <!-- Loading Screen -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Wird geprüft...</div>
  </div>

  <script src="https://unpkg.com/jsqr"></script>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const loading = document.getElementById('loading');

    let scanning = true;

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    })
    .then(stream => {
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      requestAnimationFrame(scan);
    })
    .catch(err => {
      status.innerText = '❌ Kamera Fehler';
    });

    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { willReadFrequently: true });

    function scan() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height, {
          inversionAttempts: "attemptBoth"
        });

        if (code) {
          scanning = false;

          // 👉 Loading Screen anzeigen
          loading.style.display = "flex";
          status.innerText = "Prüfe Code...";

          setTimeout(() => {
            window.location.href = code.data;
          }, 400);

          return;
        }
      }

      // 👉 leicht optimiert für Speed (nicht zu oft)
      setTimeout(() => requestAnimationFrame(scan), 60);
    }
  </script>

</body>
</html>
  `);
}
