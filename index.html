<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: black;
    }

    .frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%);
      border: 3px solid #00ff88;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ff88;
      pointer-events: none;
    }

    .status {
      margin-top: 10px;
      font-size: 1.1em;
      opacity: 0.8;
    }

    /* Loading Screen */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #333;
      border-top: 6px solid #00ff88;
</html>
