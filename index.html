<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Scanner PRO</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }

  #startScreen button {
    padding: 15px 25px;
    font-size: 18px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    font-weight: bold;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
  }

  video {
    width: 100%;
    max-width: 450px;
    border-radius: 12px;
  }

  .frame {
    position: absolute;
    width: 240px;
    height: 240px;
    border: 3px solid #00ff88;
    border-radius: 12px;
    pointer-events: none;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  /* FULL SCREEN OVERLAY */
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    background: black;
    overflow: hidden;
  }

  #overlay h1 {
    font-size: 40px;
    margin: 10px 0;
  }

  #overlay p {
    font-size: 22px;
    white-space: pre-line;
  }

  .green { background: #00c853; color: black; }
  .red { background: #d50000; color: white; }

  /* SCAN ANIMATION LINE */
  .scan-line {
    position: absolute;
    width: 80%;
    height: 3px;
    background: #00ff88;
    top: 0;
    left: 10%;
    animation: scanMove 1.2s linear infinite;
    box-shadow: 0 0 15px #00ff88;
  }

  @keyframes scanMove {
    0% { top: 10%; opacity: 0.2; }
    50% { opacity: 1; }
    100% { top: 85%; opacity: 0.2; }
  }

  #loadingText {
    font-size: 24px;
    margin-bottom: 20px;
  }

  .hidden {
    display: none !important;
  }
</style>
</head>

<body>

<div id="startScreen">
  <h2>QR Scanner</h2>
  <button onclick="startCamera()">Kamera starten</button>
</div>

<div id="overlay">
  <div class="scan-line"></div>
  <div id="loadingText">⏳ Prüfe...</div>
  <h1 id="title"></h1>
  <p id="info"></p>
</div>

<div id="app">
  <video id="video" autoplay playsinline></video>
  <div class="frame"></div>
  <div id="status">Bereit</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
let video = document.getElementById("video");
let status = document.getElementById("status");
let overlay = document.getElementById("overlay");
let title = document.getElementById("title");
let info = document.getElementById("info");
let loadingText = document.getElementById("loadingText");
let app = document.getElementById("app");

let scanning = false;

function startCamera() {
  document.getElementById("startScreen").style.display = "none";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    video.srcObject = stream;
    video.setAttribute("playsinline", true);

    video.onloadedmetadata = () => {
      video.play();
      scanning = true;
      status.innerText = "Kamera aktiv";
      requestAnimationFrame(scan);
    };
  })
  .catch(err => {
    status.innerText = "❌ Kamera Fehler: " + err.name;
  });
}

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      scanning = false;

      showLoading();

      fetch(code.data)
        .then(r => r.json())
        .then(res => {
          showResult(res.allowed, res);
        })
        .catch(() => {
          showResult(false, { name: "Fehler", year: "" });
        });

      return;
    }
  }

  requestAnimationFrame(scan);
}

function showLoading() {
  // Kamera + UI ausblenden
  app.classList.add("hidden");

  overlay.style.display = "flex";
  overlay.className = "";
  loadingText.style.display = "block";
  title.innerText = "";
  info.innerText = "";
  loadingText.innerText = "⏳ Prüfe...";
}

function showResult(ok, res) {

  loadingText.style.display = "none";

  if (ok) {
    overlay.className = "green";
    title.innerText = "✔ MITGLIED";
    info.innerText = `${res.name}\nJahrgang: ${res.year}`;
  } else {
    overlay.className = "red";
    title.innerText = "✖ KEIN ZUTRITT";
    info.innerText = res.name || "";
  }

  setTimeout(() => {
    overlay.style.display = "none";
    app.classList.remove("hidden");
    scanning = true;
    requestAnimationFrame(scan);
  }, 2500);
}
</script>

</body>
</html>
